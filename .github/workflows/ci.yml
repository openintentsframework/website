name: CI

on:
    pull_request:
        branches: [main]

jobs:
    build-lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version-file: ".node-version"
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - run: pnpm build

            - run: pnpm lint

            - run: pnpm format
